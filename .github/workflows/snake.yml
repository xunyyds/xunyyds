name: Snake 7-Color Random On Load
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xunyyds
          outputs: |
            dist/snake.svg?color_snake=ff0000&palette=github
            dist/snake-dark.svg?color_snake=ff0000&palette=github-dark

      - name: Add per-visit random color (7-color)
        run: |
          sed -i 's/<path/<path style="filter: hue-rotate($$(($$RANDOM % 7) * 51.4deg))"/g' dist/snake.svg
          sed -i 's/<path/<path style="filter: hue-rotate($$(($$RANDOM % 7) * 51.4deg))"/g' dist/snake-dark.svg

      - name: Deploy to snake branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: snake
