name: Generate Random Color Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Random bright snake color
        run: |
          COLORS=(FF2B8B FF6FFF 00E4FF 00FF9D FFFF00 FF4D00 FF006E 9D4DFF 00FFC2)
          SELECTED=${COLORS[$RANDOM % ${#COLORS[@]}]}
          echo "COLOR_SNAKE=$SELECTED" >> $GITHUB_ENV

      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xunyyds
          outputs: |
            dist/snake.svg?color_snake=${{ env.COLOR_SNAKE }}&color_dots=#FF355E,#FFF700,#00FF3C,#00BFFF,#9933FF
            dist/snake-dark.svg?palette=github-dark&color_snake=${{ env.COLOR_SNAKE }}&color_dots=#FF7EB7,#FFFF5E,#4DFF92,#4DC8FF,#D99CFF

      - name: Deploy to snake branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: snake
