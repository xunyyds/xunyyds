name: Generate Rainbow Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xunyyds
          outputs: |
            dist/snake.svg?color_snake=FFFFFF&color_dots=#FF355E,#FFF700,#00FF3C,#00BFFF,#9933FF,#FF00CC
            dist/snake-dark.svg?palette=github-dark&color_snake=FFFFFF&color_dots=#FF7EB7,#FFFF5E,#4DFF92,#4DC8FF,#D99CFF,#FF6EFF

      - name: Add color animation to snake
        run: |
          sed -i 's/<path/<path style="animation:hue 8s linear infinite"/g' dist/snake.svg
          sed -i 's/<path/<path style="animation:hue 8s linear infinite"/g' dist/snake-dark.svg
          sed -i 's/<svg/<svg style="color:white"/g' dist/snake.svg
          sed -i 's/<svg/<svg style="color:white"/g' dist/snake-dark.svg
          echo '
          <style>
            @keyframes hue {
              0% { filter: hue-rotate(0deg); }
              100% { filter: hue-rotate(360deg); }
            }
          </style>
          ' >> dist/snake.svg
          echo '
          <style>
            @keyframes hue {
              0% { filter: hue-rotate(0deg); }
              100% { filter: hue-rotate(360deg); }
            }
          </style>
          ' >> dist/snake-dark.svg

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: snake
