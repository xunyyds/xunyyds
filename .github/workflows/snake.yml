name: Generate snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          github_user_name: xunyyds
          outputs: |
            dist/snake.svg?color_snake=ffffff&color_dots=#1E90FF,#FF6347,#32CD32,#FFD700,#FF69B4
            dist/snake-dark.svg?palette=github-dark&color_snake=4ADE80&color_dots=#8B5CF6,#FB7185,#60A5FA,#FBBF24,#EC4899

      - name: Deploy to snake branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: snake
